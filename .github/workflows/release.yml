name: "release"

# Builds installers for every platform when a GitHub Release is *published*,
# and uploads them straight onto that release. `workflow_dispatch` is kept as a
# manual fallback (it creates a draft release instead).
on:
  release:
    types: [published]
  workflow_dispatch:

# Opt JS actions that still ship on Node.js 20 (rust-cache, tauri-action) onto
# Node.js 24 now, ahead of the June 2026 forced cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — Intel
          - platform: "macos-15-intel"
            rust-target: "x86_64-apple-darwin"
            args: "--target x86_64-apple-darwin"
          # macOS — Apple Silicon
          - platform: "macos-latest"
            rust-target: "aarch64-apple-darwin"
            args: "--target aarch64-apple-darwin"
          # Windows — x64 (msi + nsis). Pinned to avoid the windows-latest image redirect.
          - platform: "windows-2025"
            rust-target: ""
            args: ""
          # Windows — ARM64 (nsis)
          - platform: "windows-11-arm"
            rust-target: "aarch64-pc-windows-msvc"
            args: "--bundles nsis"
          # Linux — x86_64 (Debian/Ubuntu .deb, Fedora .rpm, universal AppImage)
          - platform: "ubuntu-22.04"
            rust-target: ""
            args: "--bundles deb,rpm,appimage"
          # Linux — aarch64 (deb + rpm + AppImage), native ARM runner
          - platform: "ubuntu-22.04-arm"
            rust-target: ""
            args: "--bundles deb,rpm,appimage"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform }}

      - name: install dependencies (Linux only)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential curl wget file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # On a published release, upload the bundles straight onto it.
          releaseId: ${{ github.event.release.id }}
          # Fallback for manual workflow_dispatch runs (no release event):
          tagName: ${{ github.event.release.tag_name || 'v__VERSION__' }}
          releaseName: "Notepad Extra ${{ github.event.release.tag_name || 'v__VERSION__' }}"
          releaseBody: "See the assets below to download and install Notepad Extra."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # Adds a "which file do I download?" table to the published release notes so
  # users can pick the right bundle. Runs once, independent of the build jobs.
  downloads-guide:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Append the downloads guide to the release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name }}
          BODY: ${{ github.event.release.body }}
        run: |
          if printf '%s' "$BODY" | grep -qF '<!-- downloads-table -->'; then
            echo "Downloads table already present; nothing to do."
            exit 0
          fi
          { printf '%s\n\n' "$BODY"; cat .github/release-downloads.md; } > "$RUNNER_TEMP/notes.md"
          gh release edit "$TAG" --repo "$REPO" --notes-file "$RUNNER_TEMP/notes.md"

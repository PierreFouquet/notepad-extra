name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Ensure icons and write minimal PNG
      run: |
        mkdir -p icons
        # write a valid 1x1 PNG (base64-decoded)
        echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR4nGNgYAAAAAMAAWgmWQ0AAAAASUVORK5CYII=" | base64 -d > icons/icon.png
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential pkg-config curl wget ca-certificates \
          libssl-dev libgtk-3-dev libayatana-appindicator3-dev \
          librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
          libwebkit2gtk-4.1-dev libgdk-pixbuf2.0-dev libglib2.0-dev
        # Ensure pkg-config can find .pc files — include the standard pc_path
        echo "PKG_CONFIG_PATH=/usr/local/lib/x86_64-linux-gnu/pkgconfig:/usr/local/lib/pkgconfig:/usr/local/share/pkgconfig:/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig" >> $GITHUB_ENV
        # Note: avoid setting PKG_CONFIG_LIBDIR (it can mask pkg-config defaults).

    - name: Diagnose pkg-config and installed .pc files
      run: |
        echo "--- Environment ---"
        env | sort
        echo "--- pkg-config pc_path ---"
        pkg-config --variable pc_path pkg-config || true
        echo "--- pkg-config: javascriptcoregtk-4.1 (modversion) ---"
        PKG_CONFIG_ALLOW_SYSTEM_CFLAGS=1 pkg-config --modversion javascriptcoregtk-4.1 || true
        echo "--- pkg-config: gdk-3.0 (modversion) ---"
        PKG_CONFIG_ALLOW_SYSTEM_CFLAGS=1 pkg-config --modversion gdk-3.0 || true
        echo "--- pkg-config: gdk-3.0 (cflags) ---"
        PKG_CONFIG_ALLOW_SYSTEM_CFLAGS=1 pkg-config --cflags gdk-3.0 || true
        echo "--- pkgconfig dirs listing ---"
        ls -la /usr/lib/x86_64-linux-gnu/pkgconfig || true
        ls -la /usr/lib/pkgconfig || true
        echo "--- dpkg listing for libjavascriptcoregtk package (if present) ---"
        dpkg -L libjavascriptcoregtk-4.1-dev || true
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose

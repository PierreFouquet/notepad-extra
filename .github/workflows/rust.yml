name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Ensure icons and write minimal PNG
      run: |
        mkdir -p icons
        # write a valid 1x1 PNG (base64-decoded)
        echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR4nGNgYAAAAAMAAWgmWQ0AAAAASUVORK5CYII=" | base64 -d > icons/icon.png
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential pkg-config curl wget ca-certificates \
          libssl-dev libgtk-3-dev libayatana-appindicator3-dev \
          librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
          libwebkit2gtk-4.1-dev libgdk-pixbuf2.0-dev libglib2.0-dev
        # Ensure pkg-config can find .pc files installed to multiarch dirs
        echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig" >> $GITHUB_ENV
        # Note: prefer installing correct dev packages on ubuntu-latest.
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose

name: "native-ci"

# Test infrastructure for the native (iced) rewrite crates — issue #27.
# Scoped to the workspace's native crates under `crates/`.
# Feature branches are covered by the `pull_request` trigger; the old
# `feat/iced-migration` push entry was the Phase 0 integration branch, merged
# and deleted via #60 (#98 hygiene).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  core:
    name: "core — fmt · clippy · test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: swatinem/rust-cache@v2
      # `notepad-syntax` rides along here (#98): it was only ever *tested* (via
      # the coverage job), so fmt/clippy regressions in it slipped every gate.
      - name: rustfmt
        run: cargo fmt --package notepad-core --package notepad-syntax -- --check
      - name: clippy (deny warnings)
        run: cargo clippy --package notepad-core --package notepad-syntax --all-targets -- -D warnings
      - name: test (unit + proptest + stress)
        run: cargo test --package notepad-core --package notepad-syntax --all-targets --verbose

  shell:
    # Windows & macOS are first-class for this epic (#25), so the shell is built
    # and its headless wiring tested on all three desktop OSes. The software
    # renderer (tiny-skia) needs no GPU anywhere; only Linux gets the extra
    # windowed launch under a virtual display (xvfb).
    name: "iced shell — ${{ matrix.os }}"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: swatinem/rust-cache@v2
      # Linux is the only target that dlopens X11/Wayland libs and needs a
      # virtual display; macOS (AppKit) and Windows (Win32) use their native,
      # always-compiled window + dialog backends — no extra packages.
      - name: install virtual display + runtime libs (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # libxkbcommon0 + the X11 companion (libxkbcommon-x11-0) that winit
          # dlopens as libxkbcommon-x11.so; xvfb provides the virtual display.
          sudo apt-get install -y --no-install-recommends \
            xvfb libxkbcommon0 libxkbcommon-x11-0
      - name: rustfmt
        if: runner.os == 'Linux'
        run: cargo fmt --package notepad-iced -- --check
      - name: clippy (deny warnings)
        run: cargo clippy --package notepad-iced --all-targets -- -D warnings
      - name: build
        run: cargo build --package notepad-iced
      - name: test (headless shell wiring + UI simulator)
        # `--all-targets` runs the `ui_tests` module too — iced_test's Simulator
        # drives the real widget tree with no window / GPU (#70), so it needs no
        # xvfb and runs identically on all three matrix OSes.
        run: cargo test --package notepad-iced --all-targets --verbose
      - name: windowed smoke (xvfb, software renderer)
        if: runner.os == 'Linux'
        run: |
          # A clean startup that stays alive until `timeout` kills it (exit 124)
          # is success; any earlier exit means the window failed to come up.
          set +e
          # The crate's binary is `notepad-extra` (#95) — the name the desktop
          # entry and man page promise.
          xvfb-run -a timeout 10 ./target/debug/notepad-extra
          code=$?
          set -e
          if [ "$code" != "124" ]; then
            echo "shell exited early (code $code) — startup failed"
            exit 1
          fi
          echo "shell started and ran under xvfb"

  coverage:
    name: "core + syntax — coverage gate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v1
        with:
          tool: cargo-llvm-cov
      - name: coverage gate
        run: bash scripts/coverage.sh --summary-only

  fuzz:
    name: "core — fuzz targets"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
      - uses: swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v1
        with:
          tool: cargo-fuzz
      # Pin the gnu target: cargo-fuzz otherwise defaults to musl on this runner,
      # whose statically linked libc is incompatible with the sanitizer (and its
      # std isn't installed) — `error: sanitizer is incompatible with statically
      # linked libc` / `E0463: can't find crate for std`.
      - name: build fuzz targets
        run: cargo fuzz build --fuzz-dir crates/core/fuzz --target x86_64-unknown-linux-gnu
      # Loop over `cargo fuzz list` rather than naming targets (#98): the old
      # explicit list silently skipped half the targets (edit_diff, prefs_parse,
      # brackets_match were built but never run), and a list can't forget a
      # future seventh target.
      - name: smoke-run every target (15s each)
        run: |
          for target in $(cargo fuzz list --fuzz-dir crates/core/fuzz); do
            echo "::group::fuzz $target"
            cargo fuzz run --fuzz-dir crates/core/fuzz --target x86_64-unknown-linux-gnu "$target" -- -max_total_time=15
            echo "::endgroup::"
          done

  licenses:
    name: "dependency licence audit (#17)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
      # Two gates in one (see scripts/license-audit.sh): fails if a copyleft-only
      # dependency sneaks into the tree, or if packaging/CRATE-LICENSES.md is out
      # of date with Cargo.lock. Online so cargo can populate the registry index.
      - name: licence audit + inventory freshness
        run: LICENSE_AUDIT_ONLINE=1 bash scripts/license-audit.sh --check
      # Keep the per-distro dependency lists (#8/#12/#13) in step with Cargo.lock.
      - name: packaging dependency lists freshness
        run: PACKAGING_DEPS_ONLINE=1 bash scripts/packaging-deps.sh --check

[package]
name = "notepad-extra"
version = "0.4.0"
edition = "2024"
description = "Small, fast, fully offline text and code editor. Inspired by Notepad++."
authors = ["Pierre Fouquet"]
license = "GPL-3.0-or-later"
homepage = "https://github.com/PierreFouquet/notepad-extra"
repository = "https://github.com/PierreFouquet/notepad-extra"
readme = "README.md"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tauri = { version = "2.0", features = [] }
tauri-plugin-dialog = "2.0"

[build-dependencies]
tauri-build = { version = "2.0", features = [] }

[dev-dependencies]
tempfile = "3.6"

# --- Native-rewrite workspace (issue #25) -------------------------------------
# The root package stays the existing Tauri app and keeps building until the
# Phase 4 cutover (#46). New native-GUI crates live under `crates/`:
#   * notepad-core — pure, UI-free `update(State, Message) -> Effect` core (#28)
#   * notepad-iced — thin iced render shell that executes the core's Effects (#28)
[workspace]
members = ["crates/core", "crates/iced"]
resolver = "2"
